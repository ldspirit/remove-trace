<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }
    .header {
      background: #2563eb;
      color: #fff;
      padding: 14px 16px;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .section h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .dot-yellow { background: #eab308; }

    .server-url {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .server-url input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 12px;
    }
    .server-url button {
      padding: 6px 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 6px;
      text-align: center;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover:not(:disabled) { background: #e5e7eb; }
    .btn-danger { background: #fef2f2; color: #dc2626; }
    .btn-danger:hover:not(:disabled) { background: #fee2e2; }

    .log {
      max-height: 120px;
      overflow-y: auto;
      font-size: 11px;
      font-family: monospace;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 6px 8px;
      margin-top: 8px;
    }
    .log-entry { margin-bottom: 2px; }
    .log-success { color: #16a34a; }
    .log-error { color: #dc2626; }
    .log-info { color: #6b7280; }

    .context-info {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 4px;
      padding: 8px;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .context-info strong { color: #0369a1; }

    .help {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .count-badge {
      background: #dbeafe;
      color: #1d4ed8;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Remove Trace</h1>
    <p>Facebook Cleanup Assistant</p>
  </div>

  <!-- Connection -->
  <div class="section">
    <h2>App Connection</h2>
    <div class="server-url">
      <input type="text" id="serverUrl" value="http://localhost:3000" placeholder="http://localhost:3000">
      <button id="testConnection">Test</button>
    </div>
    <div class="status-row" id="connectionStatus">
      <div class="status-dot dot-yellow"></div>
      <span>Not connected</span>
    </div>
  </div>

  <!-- Current Page Context -->
  <div class="section" id="contextSection" style="display:none;">
    <h2>Current Page</h2>
    <div class="context-info" id="contextInfo"></div>
  </div>

  <!-- Actions -->
  <div class="section">
    <h2>Scrape & Import</h2>

    <button class="btn btn-primary" id="scrapeFriends" disabled>
      Import Friends from Friends List
    </button>
    <p class="help" id="scrapeFriendsHelp">Navigate to facebook.com/friends/list first</p>

    <button class="btn btn-primary" id="scrapeActivity" disabled style="margin-top: 8px;">
      Scan Activity for This Friend
    </button>
    <p class="help" id="scrapeActivityHelp">Navigate to a friend's profile first</p>

    <button class="btn btn-secondary" id="scrapeActivityLog" disabled style="margin-top: 8px;">
      Scan Your Activity Log
    </button>
    <p class="help" id="scrapeActivityLogHelp">Navigate to facebook.com/allactivity first</p>
  </div>

  <!-- Log -->
  <div class="section">
    <h2>Activity Log</h2>
    <div class="log" id="log">
      <div class="log-entry log-info">Ready. Connect to your Remove Trace app to begin.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
